services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: boston-housing-api:local
    container_name: boston-housing-api
    ports:
      - "8000:8000"
    environment:
      CONFIG_PATH: /app/configs/params.yaml
      MODEL_PATH: /app/models/production/model.joblib
      MODEL_METADATA_PATH: /app/models/production/metadata.json
    volumes:
      - ./models/production:/app/models/production:ro
      - ./configs:/app/configs:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: boston-housing-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: boston-housing-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
