name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: .

jobs:
  validate:
    name: Lint, test, pipeline and Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: make setup

      - name: Lint
        run: make lint

      - name: Run training pipeline
        run: make pipeline

      - name: Tests
        run: make test

      - name: Validate API import
        run: make api-check

      - name: Build Docker image
        run: make docker-build
